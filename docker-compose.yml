services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: thinky_games
      MYSQL_USER: thinky
      MYSQL_PASSWORD: thinky
      MYSQL_ROOT_PASSWORD: thinky
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3306:3306'
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-pthinky',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: '3306'
      MYSQL_DATABASE: thinky_games
      MYSQL_USER: thinky
      MYSQL_PASSWORD: thinky
      JWT_SECRET_KEY: change-me-in-production
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      ADMIN_PASSWORD: thinky
    volumes:
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - '8080:80'
    depends_on:
      - backend

  backup:
    build: ./backup
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: '3306'
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: thinky
      MYSQL_DATABASE: thinky_games
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
